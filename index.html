<div class="category-btn"
onclick="filterCategory('sport',this)">
SPORT
</div>

</div>

<!-- CHANNELS -->

<div class="grid"
id="channels">
</div>

</div>

<!-- FOOTER -->

<div class="footer">
MADE BY MD MAMUNUR RASHID
</div>

<script>

/* CLOCK */

function updateClock(){

const now = new Date();

const days = [
'রবিবার',
'সোমবার',
'মঙ্গলবার',
'বুধবার',
'বৃহস্পতিবার',
'শুক্রবার',
'শনিবার'
];

const months = [
'জানুয়ারি',
'ফেব্রুয়ারি',
'মার্চ',
'এপ্রিল',
'মে',
'জুন',
'জুলাই',
'আগস্ট',
'সেপ্টেম্বর',
'অক্টোবর',
'নভেম্বর',
'ডিসেম্বর'
];

const bdTime =
new Date(
now.toLocaleString(
'en-US',
{timeZone:'Asia/Dhaka'}
)
);

let hour = bdTime.getHours();

const minute =
String(
bdTime.getMinutes()
).padStart(2,'0');

const second =
String(
bdTime.getSeconds()
).padStart(2,'0');

const ampm =
hour >= 12 ? 'PM' : 'AM';

hour = hour % 12;

hour = hour ? hour : 12;

const day =
days[bdTime.getDay()];

const date =
bdTime.getDate();

const month =
months[bdTime.getMonth()];

const year =
bdTime.getFullYear();

document.getElementById(
'clock'
).innerHTML =
${day}, ${date} ${month} ${year}, ${hour}:${minute}:${second} ${ampm};

}

setInterval(updateClock,1000);

updateClock();

/* LOAD CHANNELS */

fetch('channels.json')

.then(res => res.json())

.then(data => {

window.allChannels = data.channels;

loadChannels(data.channels);

document.getElementById(
'allCount'
).innerText =
data.channels.length;

});

/* SHOW CHANNELS */

function loadChannels(channels){

let html = '';

channels.forEach((ch,index) => {

html += 

<div class="card"
onclick="playChannel('${ch.url}',this)">

<img
src="${ch.logo || 'https://i.ibb.co/3k5p1t4/live-icon.png'}"
onerror="this.src='https://i.ibb.co/3k5p1t4/live-icon.png'">

<h3>${ch.name}</h3>

</div>

;

});

document.getElementById(
'channels'
).innerHTML = html;
}

/* CATEGORY FILTER */

function filterCategory(type,el){

document
.querySelectorAll('.category-btn')
.forEach(btn=>{
btn.classList.remove('active');
});

el.classList.add('active');

let filtered = [];

if(type === 'all'){

filtered = window.allChannels;

}

else if(type === 'bangla'){

filtered =
window.allChannels.filter(ch=>

ch.category &&
ch.category.toLowerCase() === 'bangla'

);

}

else if(type === 'sport'){

filtered =
window.allChannels.filter(ch=>

ch.category &&
ch.category.toLowerCase() === 'sport'

);

}

loadChannels(filtered);

}

/* PLAYER */

function playChannel(url,card){

const video =
document.getElementById('video');

document
.querySelectorAll('.card')
.forEach(c=>{
c.classList.remove('active');
});

card.classList.add('active');

if(Hls.isSupported()){

if(window.hls){
window.hls.destroy();
}

const hls = new Hls({
enableWorker:true,
lowLatencyMode:true
});

window.hls = hls;

hls.loadSource(url);

hls.attachMedia(video);

hls.on(
Hls.Events.MANIFEST_PARSED,
function(){

video.play();

});

}else{

video.src = url;

video.play();

}

}

/* REMOTE CONTROL */

document.addEventListener(
'keydown',
function(e){

const video =
document.getElementById('video');

if(e.key === 'ArrowRight'){

if(video.volume < 1){
video.volume += 0.1;
}

}

if(e.key === 'ArrowLeft'){

if(video.volume > 0){
video.volume -= 0.1;
}

}

});

</script>

</body>

</html>
