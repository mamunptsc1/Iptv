<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>LIVE TV</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:
radial-gradient(circle at top,#1a0010,#050505 50%);
color:white;
font-family:Arial,sans-serif;
overflow:hidden;
}

.header{
position:fixed;
top:0;
left:0;
width:100%;
height:60px;
display:flex;
justify-content:space-between;
align-items:center;
padding:0 15px;
background:rgba(10,10,10,0.9);
backdrop-filter:blur(15px);
z-index:99999;
}

.logo{
font-size:26px;
font-weight:bold;
color:#ff003c;
}

.video-section{
position:fixed;
top:60px;
left:0;
width:100%;
height:33vh;
background:black;
z-index:999;
}

video{
width:100%;
height:100%;
object-fit:cover;
background:black;
}

.content{
position:absolute;
top:calc(33vh + 60px);
left:0;
width:100%;
height:calc(67vh - 60px);
overflow-y:auto;
padding-bottom:120px;
}

.search-box{
padding:15px;
}

.search-box input{
width:100%;
padding:16px;
border:none;
outline:none;
border-radius:18px;
background:rgba(255,255,255,0.06);
color:white;
font-size:16px;
}

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:15px;
padding:15px;
}

.card{
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.08);
backdrop-filter:blur(18px);
border-radius:24px;
padding:18px;
text-align:center;
transition:0.35s;
}

.card:hover{
transform:translateY(-5px);
box-shadow:0 0 20px rgba(255,0,60,0.5);
}

.card img{
width:70px;
height:70px;
object-fit:contain;
}

.card h3{
margin-top:10px;
font-size:14px;
}

.bottom-nav{
position:fixed;
bottom:10px;
left:10px;
right:10px;
background:rgba(15,15,15,0.9);
backdrop-filter:blur(15px);
border-radius:35px;
display:flex;
justify-content:space-around;
padding:18px;
z-index:99999;
}

.nav{
font-size:22px;
}

.active{
color:#ff003c;
}

@media(max-width:768px){

.grid{
grid-template-columns:repeat(2,1fr);
}

.video-section{
height:30vh;
}

.content{
top:calc(30vh + 60px);
height:calc(70vh - 60px);
}
}

</style>
</head>

<body>

<div class="header">

<div class="logo">
LIVEFY TV
</div>

</div>

<div class="video-section">

<video id="video"
controls
autoplay>
</video>

</div>

<div class="content">

<div class="search-box">

<input type="text"
id="search"
placeholder="Search channels...">

</div>

<div class="grid"
id="channels">
</div>

</div>

<div class="bottom-nav">

<div class="nav active">
🏠
</div>

<div class="nav">
📺
</div>

<div class="nav">
🎬
</div>

<div class="nav">
⚙️
</div>

</div>

<script>

/* LOAD CHANNELS */

fetch('channels.json')

.then(res => res.json())

.then(data => {

const channels = data.channels;

window.allChannels = channels;

loadChannels(channels);

});

/* SHOW CHANNELS */

function loadChannels(channels){

let html = "";

channels.forEach(channel => {

if(!channel.name || !channel.url)
return;

html += `

<div class="card"

onclick="playChannel('${channel.url}')">

<img src="https://cdn-icons-png.flaticon.com/512/2504/2504947.png">

<h3>${channel.name}</h3>

</div>

`;

});

document
.getElementById('channels')
.innerHTML = html;
}

/* ADVANCED PLAYER */

function playChannel(url){

const video =
document.getElementById('video');

if(window.hls){
window.hls.destroy();
}

if(Hls.isSupported()){

const hls = new Hls({

enableWorker:true,
lowLatencyMode:true,
backBufferLength:90

});

window.hls = hls;

hls.loadSource(url);

hls.attachMedia(video);

hls.on(Hls.Events.MANIFEST_PARSED,

function(){

video.play();

});

hls.on(Hls.Events.ERROR,

function(event,data){

console.log(data);

alert("Stream Failed / Blocked");

});

}else if(video.canPlayType(
'application/vnd.apple.mpegurl')){

video.src = url;

video.play();
}
}

/* SEARCH */

document
.getElementById('search')

.addEventListener('keyup',

function(){

const value =
this.value.toLowerCase();

const filtered =
window.allChannels.filter(ch =>

ch.name
.toLowerCase()
.includes(value)

);

loadChannels(filtered);

});

</script>

</body>
</html>
