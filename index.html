<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>LIVE TV</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#020b1c;
color:#fff;
overflow:hidden;
}

/* LIVE TV TOP */

.live-btn{
width:170px;
margin:8px auto;
background:#ff005c;
padding:10px;
border-radius:40px;
text-align:center;
font-size:28px;
font-weight:bold;
box-shadow:0 0 20px #ff005c;
}

/* TOPBAR */

.topbar{
height:50px;
background:#ff005c;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 8px;
font-size:12px;
font-weight:bold;
overflow:hidden;
}

.notice{
background:#000;
padding:15px;
flex-shrink:0;
}

.notice-text{
white-space:nowrap;
overflow:hidden;
text-overflow:ellipsis;
padding:0 10px;
}

.clock{
background:#b30044;
padding:10px 12px;
border-radius:30px;
font-size:11px;
white-space:nowrap;
}

/* PLAYER */

.player{
width:96%;
height:250px;
background:#000;
margin:auto;
border-radius:18px;
overflow:hidden;
box-shadow:0 0 25px rgba(255,0,92,0.25);
}

video{
width:100%;
height:100%;
background:#000;
object-fit:cover;
}

/* CONTENT */

.content{
height:calc(100vh - 390px);
overflow-y:auto;
padding:15px;
padding-bottom:120px;
}

/* TITLE */

.section-title{
font-size:14px;
letter-spacing:4px;
margin-bottom:15px;
color:#9ba8c7;
}

/* SEARCH */

.search{
width:100%;
padding:16px;
background:#08152d;
border:none;
border-radius:16px;
color:#fff;
font-size:16px;
margin-bottom:20px;
outline:none;
}

/* GRID */

.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:15px;
}

/* CARD */

.card{
background:#0a1830;
border-radius:20px;
padding:25px 10px;
text-align:center;
border:1px solid rgba(255,255,255,0.06);
transition:0.3s;
}

.card:hover{
transform:scale(1.03);
box-shadow:0 0 20px rgba(255,0,92,0.4);
}

.card img{
width:70px;
height:70px;
object-fit:contain;
margin-bottom:15px;
}

.card h3{
font-size:17px;
}

/* NAV */

.nav{
position:fixed;
bottom:0;
left:0;
width:100%;
height:80px;
background:#04122a;
display:flex;
justify-content:space-around;
align-items:center;
border-top:1px solid rgba(255,255,255,0.08);
}

.nav-item{
text-align:center;
font-size:15px;
color:#888;
}

.active{
color:#ff005c;
}

/* SCROLLBAR */

::-webkit-scrollbar{
width:5px;
}

::-webkit-scrollbar-thumb{
background:#ff005c;
border-radius:20px;
}

/* MOBILE */

@media(max-width:768px){

.player{
height:230px;
}

.card{
padding:22px 8px;
}

.card h3{
font-size:15px;
}

.live-btn{
font-size:24px;
width:170px;
}

}

</style>

</head>

<body>

<!-- LIVE TV -->

<div class="live-btn">
🔴 LIVE TV
</div>

<!-- NOTICE -->

<div class="topbar">

<div class="notice">
NOTICE
</div>

<div class="notice-text">
সব চ্যানেল লোড হতে ১০-১৫ সেকেন্ড সময় লাগতে পারে
</div>

<div class="clock" id="clock">
Loading...
</div>

</div>

<!-- PLAYER -->

<div class="player">

<video
id="video"
controls
autoplay
playsinline>
</video>

</div>

<!-- CONTENT -->

<div class="content">

<div class="section-title">
PREMIUM TV CHANNELS
</div>

<input
type="text"
class="search"
id="search"
placeholder="Search channels...">

<div class="grid"
id="channels">
</div>

</div>

<!-- BOTTOM NAV -->

<div class="nav">

<div class="nav-item">
🏠<br>HOME
</div>

<div class="nav-item active">
📺<br>LIVE TV
</div>

</div>

<script>

/* CLOCK */

function updateClock(){

const now = new Date();

const bd = now.toLocaleString(
'en-GB',
{
timeZone:'Asia/Dhaka',
weekday:'short',
day:'2-digit',
month:'short',
year:'numeric',
hour:'2-digit',
minute:'2-digit',
second:'2-digit'
});

document.getElementById(
'clock'
).innerHTML = bd;
}

setInterval(updateClock,1000);

updateClock();

/* LOAD CHANNELS */

fetch('channels.json')

.then(res => res.json())

.then(data => {

window.allChannels = data.channels;

loadChannels(data.channels);

});

/* SHOW CHANNELS */

function loadChannels(channels){

let html = '';

channels.forEach(ch => {

if(!ch.name || !ch.url) return;

html += `

<div class="card"
onclick="playChannel('${ch.url}')">

<img src="https://cdn-icons-png.flaticon.com/512/810/810228.png">

<h3>${ch.name}</h3>

</div>

`;

});

document.getElementById(
'channels'
).innerHTML = html;
}

/* PLAY CHANNEL */

function playChannel(url){

const video =
document.getElementById('video');

if(Hls.isSupported()){

if(window.hls){
window.hls.destroy();
}

const hls = new Hls({
enableWorker:true,
lowLatencyMode:true
});

window.hls = hls;

hls.loadSource(url);

hls.attachMedia(video);

hls.on(
Hls.Events.MANIFEST_PARSED,
function(){

video.play();

});

hls.on(
Hls.Events.ERROR,
function(event,data){

console.log(data);

});

}else{

video.src = url;

video.play();
}
}

/* SEARCH */

document
.getElementById('search')

.addEventListener('keyup',

function(){

const value =
this.value.toLowerCase();

const filtered =
window.allChannels.filter(ch =>

ch.name
.toLowerCase()
.includes(value)

);

loadChannels(filtered);

});

</script>

</body>
</html>
