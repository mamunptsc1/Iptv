<style>

/* TOPBAR */

.topbar{

height:45px;

background:#ff0055;

display:flex;

align-items:center;

overflow:hidden;

position:relative;

z-index:99999;

}

/* NOTICE */

.notice{

background:black;

padding:14px;

font-size:14px;

font-weight:bold;

z-index:2;

}

/* MARQUEE */

.marquee{

white-space:nowrap;

display:inline-block;

padding-left:20px;

animation:move 15s linear infinite;

font-weight:bold;

}

@keyframes move{

0%{
transform:translateX(100%);
}

100%{
transform:translateX(-100%);
}

}

/* BD CLOCK */

#bd-clock{

position:absolute;

right:12px;

font-size:13px;

font-weight:bold;

color:white;

background:rgba(0,0,0,0.25);

padding:6px 12px;

border-radius:20px;

backdrop-filter:blur(8px);

z-index:3;

}

/* LIVE TV BANNER */

.live-banner{

position:absolute;

top:12px;

left:50%;

transform:translateX(-50%);

background:#ff0055;

padding:8px 20px;

border-radius:30px;

font-size:14px;

font-weight:bold;

z-index:9999;

box-shadow:0 0 15px #ff0055;

}

/* NAVBAR */

.navbar{

position:fixed;

bottom:0;

left:0;

width:100%;

height:70px;

background:#091529;

display:flex;

justify-content:space-evenly;

align-items:center;

border-top:1px solid rgba(255,255,255,0.08);

z-index:99999;

}

.nav{

text-align:center;

font-size:14px;

color:#9aa8bb;

}

.active{

color:#ff0055;

}

.icon{

font-size:24px;

display:block;

margin-bottom:5px;

}

</style>

<script>

/* LIVE BD TIME */

function updateBDTime(){

const now = new Date();

const options = {

timeZone:'Asia/Dhaka',

weekday:'short',

day:'2-digit',

month:'short',

year:'numeric',

hour:'2-digit',

minute:'2-digit',

second:'2-digit'

};

const bdTime =
now.toLocaleString('en-GB',options);

document
.getElementById('bd-clock')
.innerHTML = bdTime;

}

setInterval(updateBDTime,1000);

updateBDTime();

</script>
