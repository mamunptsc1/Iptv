<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>LIVE TV</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:#070707;
  color:white;
  font-family:Arial, sans-serif;
}

.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px;
  background:#111;

  position:sticky;
  top:0;
  z-index:999;

  box-shadow:0 0 15px rgba(255,0,60,0.3);
}

.logo{
  font-size:28px;
  font-weight:bold;
  color:#ff003c;

  text-shadow:
  0 0 10px #ff003c,
  0 0 20px #ff003c;
}

.telegram-btn{
  background:#ff003c;
  padding:10px 18px;
  border-radius:30px;
  color:white;
  text-decoration:none;
  font-weight:bold;

  box-shadow:0 0 10px #ff003c;
}

.banner{
  margin:15px;
  background:linear-gradient(90deg,#ff003c,#00ff66);
  color:white;
  padding:12px;
  border-radius:15px;
  text-align:center;
  font-weight:bold;
}

.clock{
  text-align:center;
  font-size:20px;
  margin-top:10px;
  color:#00ff99;
}

.search-box{
  padding:15px;
}

.search-box input{
  width:100%;
  padding:14px;
  border:none;
  border-radius:15px;
  background:#161616;
  color:white;
  font-size:16px;
}

video{
  width:100%;
  height:230px;
  background:black;
}

.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:15px;
  padding:15px;
  padding-bottom:120px;
}

.card{
  background:rgba(255,255,255,0.05);

  border:1px solid rgba(255,255,255,0.08);

  backdrop-filter:blur(10px);

  border-radius:22px;

  padding:18px;

  text-align:center;

  transition:0.3s;
}

.card:hover{
  transform:translateY(-5px);

  box-shadow:
  0 0 15px #ff003c;
}

.card img{
  width:75px;
  height:75px;
  object-fit:contain;
}

.card h3{
  margin-top:10px;
  font-size:16px;
}

.bottom-nav{
  position:fixed;
  bottom:10px;
  left:10px;
  right:10px;

  background:#111;

  border-radius:35px;

  display:flex;
  justify-content:space-around;
  align-items:center;

  padding:18px;

  box-shadow:0 0 20px rgba(255,0,60,0.3);
}

.nav-item{
  text-align:center;
  color:white;
  font-size:14px;
}

.active{
  color:#ff003c;
}

.ad-box{
  margin:15px;
  background:#161616;
  border:2px solid #00ff66;
  border-radius:12px;
  overflow:hidden;
}

.ad-box img{
  width:100%;
  display:block;
}

@media(max-width:768px){

  .grid{
    grid-template-columns:repeat(2,1fr);
  }
}
</style>
</head>

<body>

<div class="header">

  <div class="logo">LIVEFY TV</div>

  <a href="#" class="telegram-btn">Join Now</a>

</div>

<div class="banner">
  UPDATE — Live Sports + Bangla TV Available
</div>

<div class="clock" id="clock"></div>

<video id="video" controls autoplay></video>

<div class="search-box">
  <input type="text" id="search" placeholder="Search Channel...">
</div>

<div class="grid" id="channels"></div>

<div class="ad-box">
  <img src="https://dummyimage.com/700x100/0f0/000.png&text=Your+Ads+Here">
</div>

<div class="bottom-nav">

  <div class="nav-item">🏠<br>Home</div>

  <div class="nav-item active">📺<br>Live TV</div>

  <div class="nav-item">🎬<br>Highlights</div>

</div>

<script>

const channels = [

{
  name:"Star Jalsha",
  logo:"https://upload.wikimedia.org/wikipedia/en/thumb/8/87/Star_Jalsha_logo.svg/1200px-Star_Jalsha_logo.svg.png",
  url:"https://playztv-apps.pages.dev/star-jalsha/index.m3u8"
},

{
  name:"Channel i",
  logo:"https://upload.wikimedia.org/wikipedia/en/thumb/0/08/Channel_i.svg/2560px-Channel_i.svg.png",
  url:"https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8"
},

{
  name:"ATN Bangla",
  logo:"https://upload.wikimedia.org/wikipedia/en/4/4b/ATN_Bangla_Logo.png",
  url:"https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8"
},

{
  name:"NTV",
  logo:"https://upload.wikimedia.org/wikipedia/en/thumb/e/e6/Ntv_Bangladesh.svg/1200px-Ntv_Bangladesh.svg.png",
  url:"https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8"
}

];

function loadChannels(list){

  let html = "";

  list.forEach(channel=>{

    html += `

    <div class="card" onclick="playChannel('${channel.url}')">

      <img src="${channel.logo}">

      <h3>${channel.name}</h3>

    </div>

    `;
  });

  document.getElementById('channels').innerHTML = html;
}

loadChannels(channels);

function playChannel(url){

  const video = document.getElementById('video');

  if(Hls.isSupported()){

    const hls = new Hls();

    hls.loadSource(url);

    hls.attachMedia(video);
  }
}

const search = document.getElementById('search');

search.addEventListener('keyup',()=>{

  const value = search.value.toLowerCase();

  const filtered = channels.filter(ch=>
    ch.name.toLowerCase().includes(value)
  );

  loadChannels(filtered);
});

function updateClock(){

  const now = new Date();

  document.getElementById('clock').innerHTML =
    now.toLocaleTimeString();
}

setInterval(updateClock,1000);

</script>

</body>
</html>
