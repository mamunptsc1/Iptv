<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Livefy IP TV - TV & PC Mode</title>
<link rel="icon" href="https://i.ibb.co/3k5p1t4/live-icon.png">
<link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
:root {
    --bg: #050505; --card: #1a1a1a; --accent: #00E5FF; --fav: #FFD700; --text: #fff;
    --text-secondary: #aaa; --border-color: #333;
}
* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; }
body { background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

/* Header & Ticker */
.app-header { background: #000; padding: 10px; text-align: center; border-bottom: 1px solid var(--border-color); }
.app-header h1 { font-size: 1.5rem; color: var(--accent); letter-spacing: 2px; }

.news-ticker-container { background: #1a1a1a; height: 35px; overflow: hidden; display: flex; align-items: center; border-bottom: 2px solid #ed1c24; }
.news-label { background: #ed1c24; color: white; padding: 0 15px; font-size: 0.8rem; font-weight: bold; height: 100%; display: flex; align-items: center; z-index: 10; }
.ticker-wrap { flex: 1; overflow: hidden; }
.ticker-content { display: inline-block; white-space: nowrap; animation: ticker-animation 100s linear infinite; font-size: 1rem; padding-left: 100%; }
@keyframes ticker-animation { 0% { transform: translateX(0); } 100% { transform: translateX(-100%); } }

/* Main Layout */
.main-container { display: flex; flex: 1; overflow: hidden; }

/* Player Section */
.player-section { flex: 7; background: #000; display: flex; flex-direction: column; position: relative; }
.player-wrap { width: 100%; aspect-ratio: 16/9; background: #000; }
.plyr { height: 100% !important; }
.now-playing { padding: 15px; background: #0a0a0a; border-top: 1px solid var(--border-color); display: flex; align-items: center; gap: 10px; }
#current-ch-name { font-size: 1.2rem; font-weight: bold; color: var(--accent); }

/* Sidebar Section */
.sidebar { flex: 3; display: flex; flex-direction: column; border-left: 1px solid var(--border-color); background: #0a0a0a; }
.controls-panel { padding: 10px; display: flex; flex-direction: column; gap: 10px; }
select, #searchInput { width: 100%; padding: 12px; background: #1a1a1a; border: 1px solid #333; color: #fff; border-radius: 5px; outline: none; font-size: 1rem; }

.actions { display: flex; border-bottom: 1px solid var(--border-color); flex-wrap: wrap; }
.actions div { flex: 1; text-align: center; padding: 12px 5px; cursor: pointer; font-size: 0.85rem; transition: 0.3s; border: 1px solid #222; }
.actions div:hover, .actions div.active-tab { background: var(--accent); color: #000; font-weight: bold; }

.list { flex: 1; overflow-y: auto; padding: 10px; }
.category-title { font-size: 0.9rem; color: var(--accent); padding: 10px 0; border-bottom: 1px solid #222; margin-top: 10px; text-transform: uppercase; }

/* Channel Row */
.row { 
    display: flex; align-items: center; gap: 15px; background: var(--card); padding: 12px; 
    border-radius: 8px; margin-bottom: 8px; cursor: pointer; border: 2px solid transparent; 
    transition: all 0.2s; outline: none;
}
.row:focus, .row:hover { border-color: var(--accent); background: #252525; transform: scale(1.02); }
.row.active { background: rgba(0, 229, 255, 0.2); border-left: 5px solid var(--accent); }
.list-logo { width: 45px; height: 45px; border-radius: 5px; object-fit: contain; background: #000; }
.name { flex: 1; font-size: 1rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* Loader */
#loader { position: absolute; inset: 0; display: none; align-items: center; justify-content: center; background: rgba(0,0,0,0.8); z-index: 100; flex-direction: column; gap: 10px;}
.spinner { width: 45px; height: 45px; border: 5px solid #333; border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

@media (max-width: 800px) {
    .main-container { flex-direction: column; }
    .sidebar { flex: 1; border-left: none; height: 50vh; }
    .player-section { flex: none; }
}
</style>
</head>
<body>

<div class="app-header"><h1>LIVEFY IP TV</h1></div>

<div class="news-ticker-container">
    <div class="news-label">ব্রেকিং নিউজ</div>
    <div class="ticker-wrap">
        <div class="ticker-content" id="news-ticker-text">সংবাদ লোড হচ্ছে...</div>
    </div>
</div>

<div class="main-container">
    <div class="player-section">
        <div id="loader"><div class="spinner"></div><p>লোড হচ্ছে...</p></div>
        <div class="player-wrap">
            <video id="video" playsinline crossorigin="anonymous"></video>
        </div>
        <div class="now-playing">
            <i class="fas fa-play-circle"></i>
            <span id="current-ch-name">চ্যানেল নির্বাচন করুন</span>
        </div>
    </div>

    <div class="sidebar">
        <div class="controls-panel">
            <select id="categorySelect"><option value="_all_">সব ক্যাটাগরি</option></select>
            <input type="text" id="searchInput" placeholder="চ্যানেল খুঁজুন..." onkeyup="render()">
        </div>
        <div class="actions">
            <div id="allBtnTab" class="active-tab" onclick="switchTab('all', this)"><i class="fas fa-list"></i> All</div>
            <div id="favBtnTab" onclick="switchTab('fav', this)"><i class="fas fa-star"></i> Fav</div>
            <div onclick="location.reload()"><i class="fas fa-sync"></i> Refresh</div>
            <div onclick="window.open('https://t.me/livefytv', '_blank')"><i class="fab fa-telegram"></i> Telegram</div>
        </div>
        <div class="list" id="list"></div>
    </div>
</div>

<script src="https://cdn.plyr.io/3.7.8/plyr.js"></script>
<script>
const video = document.getElementById('video');
const loader = document.getElementById('loader');
const listArea = document.getElementById('list');
const categorySelect = document.getElementById('categorySelect');
const chNameDisplay = document.getElementById('current-ch-name');
const searchInput = document.getElementById('searchInput');

let hls = new Hls();
let player;
let allChannels = [];
let categorizedChannels = {};
let isFavView = false;

// আপনার দেওয়া লিঙ্কগুলো
const playlists = [
    "https://raw.githubusercontent.com/sm-monirulislam/RoarZone-Auto-Update-playlist/refs/heads/main/RoarZone.m3u",
    "https://raw.githubusercontent.com/sm-monirulislam/SM-Live-TV/refs/heads/main/Bangla%20Channel.m3u"
];

document.addEventListener('DOMContentLoaded', () => {
    player = new Plyr(video, { controls: ['play-large', 'play', 'progress', 'current-time', 'mute', 'volume', 'settings', 'fullscreen'] });
    initApp();
});

async function initApp() {
    loader.style.display = 'flex';
    await fetchBanglaNews();
    await loadPlaylists();
    setupRemoteControl();
    loader.style.display = 'none';
}

async function fetchBanglaNews() {
    try {
        const res = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=https://www.prothomalo.com/feed`);
        const data = await res.json();
        document.getElementById('news-ticker-text').innerText = data.items.map(i => i.title).join('  |  ');
    } catch (e) { document.getElementById('news-ticker-text').innerText = "নিউজ লোড করা যাচ্ছে না।"; }
}

async function loadPlaylists() {
    allChannels = [];
    categorizedChannels = {};
    
    for (const url of playlists) {
        try {
            const res = await fetch(url);
            const text = await res.text();
            parseM3U(text);
        } catch (e) { console.log("Playlist error:", e); }
    }
    
    populateCategories();
    render();
}

function parseM3U(data) {
    const lines = data.split('\n');
    let currentCh = null;

    lines.forEach(line => {
        const trm = line.trim();
        if (trm.startsWith('#EXTINF:')) {
            const name = trm.split(',')[1] || "Unknown";
            const logo = trm.match(/tvg-logo="([^"]*)"/)?.[1] || "";
            const group = trm.match(/group-title="([^"]*)"/)?.[1] || "Others";
            currentCh = { name, logo, group };
        } else if (trm.startsWith('http')) {
            if (currentCh) {
                currentCh.url = trm;
                allChannels.push(currentCh);
                if (!categorizedChannels[currentCh.group]) categorizedChannels[currentCh.group] = [];
                categorizedChannels[currentCh.group].push(currentCh);
                currentCh = null;
            }
        }
    });
}

function populateCategories() {
    const groups = Object.keys(categorizedChannels).sort();
    groups.forEach(g => {
        const opt = document.createElement('option');
        opt.value = g;
        opt.innerText = g;
        categorySelect.appendChild(opt);
    });
    categorySelect.onchange = render;
}

function render() {
    listArea.innerHTML = "";
    const query = searchInput.value.toLowerCase();
    const selCat = categorySelect.value;
    
    const cats = (selCat === '_all_') ? Object.keys(categorizedChannels).sort() : [selCat];

    cats.forEach(cat => {
        const filtered = (categorizedChannels[cat] || []).filter(ch => ch.name.toLowerCase().includes(query));
        if (filtered.length > 0) {
            const title = document.createElement('div');
            title.className = 'category-title';
            title.innerText = cat;
            listArea.appendChild(title);

            filtered.forEach(ch => {
                const row = document.createElement('div');
                row.className = 'row';
                row.tabIndex = 0;
                row.innerHTML = `<img src="${ch.logo}" class="list-logo" onerror="this.src='https://i.ibb.co/3k5p1t4/live-icon.png'"><div class="name">${ch.name}</div>`;
                row.onclick = () => playChannel(ch, row);
                listArea.appendChild(row);
            });
        }
    });
}

function playChannel(ch, el) {
    document.querySelectorAll('.row').forEach(r => r.classList.remove('active'));
    el.classList.add('active');
    chNameDisplay.innerText = ch.name;
    
    loader.style.display = 'flex';
    // টিভিতে ২ সেকেন্ডের বেশি লোডার আটকে থাকলে অটো বন্ধ হবে
    const forceCloseLoader = setTimeout(() => { loader.style.display = 'none'; }, 5000);

    if (Hls.isSupported()) {
        hls.destroy();
        hls = new Hls();
        hls.loadSource(ch.url);
        hls.attachMedia(video);
        hls.on(Hls.Events.MANIFEST_PARSED, () => {
            clearTimeout(forceCloseLoader);
            loader.style.display = 'none';
            player.play().catch(() => { player.muted = true; player.play(); });
        });
        hls.on(Hls.Events.ERROR, () => { loader.style.display = 'none'; });
    } else {
        video.src = ch.url;
        video.addEventListener('loadedmetadata', () => {
            clearTimeout(forceCloseLoader);
            loader.style.display = 'none';
            video.play();
        });
    }
}

function setupRemoteControl() {
    document.addEventListener('keydown', (e) => {
        const active = document.activeElement;
        if (e.key === 'ArrowDown') {
            const next = active.nextElementSibling;
            if (next && next.classList.contains('row')) next.focus();
            else if (next && next.classList.contains('category-title')) next.nextElementSibling.focus();
        } else if (e.key === 'ArrowUp') {
            const prev = active.previousElementSibling;
            if (prev && prev.classList.contains('row')) prev.focus();
            else if (prev && prev.classList.contains('category-title')) prev.previousElementSibling.focus();
        } else if (e.key === 'Enter') {
            if (active.classList.contains('row')) active.click();
        }
    });
}

function switchTab(type, el) {
    document.querySelectorAll('.actions div').forEach(d => d.classList.remove('active-tab'));
    el.classList.add('active-tab');
    // Favorites logic add করা যেতে পারে এখানে
}
</script>

</body>
</html>
