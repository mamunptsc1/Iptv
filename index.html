<!DOCTYPE html>
<html lang="bn">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>LIVE TV</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:linear-gradient(180deg,#020b1c,#03142d);
color:#fff;
overflow:hidden;
}

/* TOPBAR */

.topbar{
height:55px;
background:#ff005c;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 10px;
font-size:12px;
font-weight:bold;
overflow:hidden;
}

.notice{
background:#000;
padding:18px;
flex-shrink:0;
font-size:14px;
}

.notice-text{
flex:1;
overflow:hidden;
white-space:nowrap;
position:relative;
height:100%;
display:flex;
align-items:center;
padding:0 10px;
}

.notice-text span{
display:inline-block;
padding-left:100%;
animation:marquee 15s linear infinite;
white-space:nowrap;
}

@keyframes marquee{
0%{
transform:translateX(0);
}
100%{
transform:translateX(-100%);
}
}

.clock{
background:#b30044;
padding:10px 14px;
border-radius:30px;
font-size:11px;
white-space:nowrap;
}

/* PLAYER */

.player-wrapper{
width:100%;
padding:12px;
}

.player{
width:100%;
height:240px;
background:#000;
border-radius:24px;
overflow:hidden;
box-shadow:
0 0 25px rgba(255,0,92,0.25);
}

video{
width:100%;
height:100%;
object-fit:contain;
background:#000;
outline:none;
border:none;
}

/* CONTENT */

.content{
height:calc(100vh - 360px);
overflow-y:auto;
padding:15px;
padding-bottom:120px;
}

/* TITLE */

.section-title{
font-size:15px;
letter-spacing:6px;
margin-bottom:18px;
color:#9ba8c7;
}

/* SEARCH */

.search{
width:100%;
padding:16px;
background:#081a34;
border:none;
border-radius:14px;
margin-bottom:20px;
color:#fff;
font-size:15px;
outline:none;
}

/* GRID */

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:12px;
}

/* CARD */

.card{
background:linear-gradient(180deg,#071427,#081a34);
border-radius:18px;
padding:14px 8px;
text-align:center;
border:1px solid rgba(255,255,255,0.05);
transition:0.3s;
min-height:155px;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
cursor:pointer;
}

.card:hover{
transform:translateY(-4px);
box-shadow:0 0 20px rgba(255,0,92,0.25);
}

.card.active{
border:2px solid #ff005c;
box-shadow:0 0 20px rgba(255,0,92,0.4);
}

.card img{
width:75px;
height:55px;
object-fit:contain;
margin-bottom:12px;
border-radius:10px;
background:#fff;
padding:4px;
}

.card h3{
font-size:14px;
font-weight:500;
line-height:20px;
}

/* FOOTER */

.footer{
position:fixed;
bottom:0;
left:0;
width:100%;
height:65px;
background:#04122a;
display:flex;
align-items:center;
justify-content:center;
font-size:15px;
color:#ff005c;
font-weight:bold;
border-top:1px solid rgba(255,255,255,0.08);
}
/* PC VERSION */

@media(min-width:1024px){

body{
overflow:hidden;
}

.player-wrapper{
width:70%;
float:left;
padding:15px;
}

.content{
width:30%;
float:right;
height:calc(100vh - 120px);
padding:15px;
overflow-y:auto;
}

.player{
height:420px;
}

.grid{
grid-template-columns:repeat(2,1fr);
gap:15px;
}

.card{
min-height:170px;
}

.card img{
width:90px;
height:65px;
}

.section-title{
font-size:18px;
}

.search{
font-size:16px;
padding:18px;
}

.footer{
height:55px;
font-size:16px;
}

}
/* MOBILE */

@media(max-width:768px){

.grid{
grid-template-columns:repeat(3,1fr);
}

.player{
height:220px;
}

.card{
min-height:150px;
}

.card img{
width:70px;
height:50px;
}

}

</style>

</head>

<body>

<!-- TOPBAR -->

<div class="topbar">

<div class="notice">
NOTICE
</div>

<div class="notice-text">
<span>
সব চ্যানেল লোড হতে ১০-১৫ সেকেন্ড সময় লাগতে পারে
</span>
</div>

<div class="clock" id="clock">
Loading...
</div>

</div>

<!-- PLAYER -->

<div class="player-wrapper">

<div class="player">

<video
id="video"
controls
autoplay
playsinline>
</video>

</div>

</div>

<!-- CONTENT -->

<div class="content">

<div class="section-title">
PREMIUM TV CHANNELS
</div>

<input
type="text"
class="search"
id="search"
placeholder="Search channels...">

<div class="grid"
id="channels">
</div>

</div>

<!-- FOOTER -->

<div class="footer">
MADE BY MD MAMUNUR RASHID
</div>

<script>

/* CLOCK */

function updateClock(){

const now = new Date();

const days = [
'রবিবার',
'সোমবার',
'মঙ্গলবার',
'বুধবার',
'বৃহস্পতিবার',
'শুক্রবার',
'শনিবার'
];

const months = [
'জানুয়ারি',
'ফেব্রুয়ারি',
'মার্চ',
'এপ্রিল',
'মে',
'জুন',
'জুলাই',
'আগস্ট',
'সেপ্টেম্বর',
'অক্টোবর',
'নভেম্বর',
'ডিসেম্বর'
];

const bdTime =
new Date(
now.toLocaleString(
'en-US',
{
timeZone:'Asia/Dhaka'
}
)
);

let hour =
bdTime.getHours();

const minute =
String(
bdTime.getMinutes()
).padStart(2,'0');

const second =
String(
bdTime.getSeconds()
).padStart(2,'0');

const ampm =
hour >= 12 ? 'PM' : 'AM';

hour = hour % 12;

hour = hour ? hour : 12;

const day =
days[bdTime.getDay()];

const date =
bdTime.getDate();

const month =
months[bdTime.getMonth()];

const year =
bdTime.getFullYear();

document.getElementById(
'clock'
).innerHTML =
`${day}, ${date} ${month} ${year} | ${hour}:${minute}:${second} ${ampm}`;

}
setInterval(updateClock,1000);

updateClock();
  
/* LOAD CHANNELS */

fetch('channels.json')

.then(res => res.json())

.then(data => {

window.allChannels = data.channels;

loadChannels(data.channels);

});

/* SHOW CHANNELS */

function loadChannels(channels){

let html = '';

channels.forEach(ch => {

html += `

<div class="card"
onclick="playChannel('${ch.url}', this)">

<img
src="${ch.logo || 'https://cdn-icons-png.flaticon.com/512/810/810228.png'}"
onerror="this.src='https://cdn-icons-png.flaticon.com/512/810/810228.png'">

<h3>${ch.name}</h3>

</div>

`;

});

document.getElementById(
'channels'
).innerHTML = html;
}

/* PLAYER */

function playChannel(url,card){

const video =
document.getElementById('video');

document
.querySelectorAll('.card')
.forEach(c=>{
c.classList.remove('active');
});

card.classList.add('active');

if(Hls.isSupported()){

if(window.hls){
window.hls.destroy();
}

const hls = new Hls({
enableWorker:true,
lowLatencyMode:true
});

window.hls = hls;

hls.loadSource(url);

hls.attachMedia(video);

hls.on(
Hls.Events.MANIFEST_PARSED,
function(){

video.play();

});

}else{

video.src = url;

video.play();

}

}

/* SEARCH */

document
.getElementById('search')

.addEventListener(
'keyup',

function(){

const value =
this.value.toLowerCase();

const filtered =
window.allChannels.filter(ch=>

ch.name
.toLowerCase()
.includes(value)

);

loadChannels(filtered);

});

/* REMOTE VOLUME */

document.addEventListener(
'keydown',
function(e){

const video =
document.getElementById('video');

if(e.key === 'ArrowRight'){

if(video.volume < 1){
video.volume += 0.1;
}

}

if(e.key === 'ArrowLeft'){

if(video.volume > 0){
video.volume -= 0.1;
}

}

});

</script>

</body>

</html>
