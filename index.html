<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LIVE TV</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:linear-gradient(180deg,#020b1c,#03142d);
color:#fff;
overflow:hidden;
}

/* TOPBAR */

.topbar{
height:55px;
background:#ff005c;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 10px;
font-size:12px;
font-weight:bold;
overflow:hidden;
}

.notice{
background:#000;
padding:18px;
flex-shrink:0;
font-size:14px;
}

.notice-text{
white-space:nowrap;
overflow:hidden;
text-overflow:ellipsis;
padding:0 10px;
font-size:14px;
}

.clock{
background:#b30044;
padding:10px 14px;
border-radius:30px;
font-size:11px;
white-space:nowrap;
}

/* PLAYER */

.player-wrapper{
width:100%;
padding:12px;
}

.player{
width:100%;
height:220px;
background:#000;
border-radius:22px;
overflow:hidden;
box-shadow:0 0 25px rgba(255,0,92,0.2);
}

video{
width:100%;
height:100%;
object-fit:cover;
background:#000;
}

/* CONTENT */

.content{
height:calc(100vh - 365px);
overflow-y:auto;
padding:15px;
padding-bottom:120px;
}

/* TITLE */

.section-title{
font-size:15px;
letter-spacing:6px;
margin-bottom:18px;
color:#9ba8c7;
}

/* CATEGORY */

.category-bar{
display:flex;
gap:10px;
margin-bottom:20px;
overflow-x:auto;
}

.category-btn{
background:#081a34;
padding:12px 18px;
border-radius:14px;
font-size:14px;
border:1px solid rgba(255,255,255,0.05);
white-space:nowrap;
cursor:pointer;
transition:0.3s;
}

.category-btn.active{
background:#ff005c;
color:#fff;
box-shadow:0 0 15px rgba(255,0,92,0.5);
}

/* GRID */

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:12px;
}

/* CARD */

.card{
background:linear-gradient(180deg,#071427,#081a34);
border-radius:18px;
padding:14px 8px;
text-align:center;
border:1px solid rgba(255,255,255,0.05);
transition:0.3s;
min-height:155px;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

.card:hover{
transform:translateY(-4px);
box-shadow:0 0 20px rgba(255,0,92,0.25);
}

.card img{
width:75px;
height:55px;
object-fit:contain;
margin-bottom:12px;
border-radius:10px;
background:#fff;
padding:4px;
}

.card h3{
font-size:14px;
font-weight:500;
line-height:20px;
}

/* FOOTER */

.footer{
position:fixed;
bottom:0;
left:0;
width:100%;
height:65px;
background:#04122a;
display:flex;
align-items:center;
justify-content:center;
font-size:15px;
color:#ff005c;
font-weight:bold;
border-top:1px solid rgba(255,255,255,0.08);
}

/* SCROLL */

::-webkit-scrollbar{
width:4px;
}

::-webkit-scrollbar-thumb{
background:#ff005c;
border-radius:20px;
}

/* MOBILE */

@media(max-width:768px){

.grid{
grid-template-columns:repeat(3,1fr);
}

.player{
height:210px;
}

.card{
min-height:150px;
}

.card img{
width:70px;
height:50px;
}

}

</style>
</head>

<body>

<!-- TOPBAR -->

<div class="topbar">

<div class="notice">
NOTICE
</div>

<div class="notice-text">
সব চ্যানেল লোড হতে ১০-১৫ সেকেন্ড সময় লাগতে পারে
</div>

<div class="clock" id="clock">
Loading...
</div>

</div>

<!-- PLAYER -->

<div class="player-wrapper">

<div class="player">

<video
id="video"
controls
autoplay
playsinline>
</video>

</div>

</div>

<!-- CONTENT -->

<div class="content">

<div class="section-title">
PREMIUM TV CHANNELS
</div>

<!-- CATEGORY -->

<div class="category-bar">

<div class="category-btn active">
ALL (120)
</div>

<div class="category-btn">
BANGLA
</div>

<div class="category-btn">
SPORT
</div>

</div>

<!-- CHANNEL GRID -->

<div class="grid"
id="channels">
</div>

</div>

<!-- FOOTER -->

<div class="footer">
MADE BY MD MAMUNUR RASHID
</div>

<script>

/* CLOCK */

function updateClock(){

const now = new Date();

const bd = now.toLocaleString(
'en-GB',
{
timeZone:'Asia/Dhaka',
weekday:'short',
day:'2-digit',
month:'short',
year:'numeric',
hour:'2-digit',
minute:'2-digit',
second:'2-digit'
});

document.getElementById(
'clock'
).innerHTML = bd;
}

setInterval(updateClock,1000);

updateClock();

/* LOAD CHANNELS */

fetch('channels.json')

.then(res => res.json())

.then(data => {

window.allChannels = data.channels;

loadChannels(data.channels);

});

/* SHOW CHANNELS */

function loadChannels(channels){

let html = '';

channels.forEach(ch => {

html += `

<div class="card"
onclick="playChannel('${ch.url}')">

<img src="${ch.logo || 'https://i.ibb.co/3k5p1t4/live-icon.png'}"
onerror="this.src='https://i.ibb.co/3k5p1t4/live-icon.png'">

<h3>${ch.name}</h3>

</div>

`;

});

document.getElementById(
'channels'
).innerHTML = html;
}

/* PLAYER */

function playChannel(url){

const video =
document.getElementById('video');

if(Hls.isSupported()){

if(window.hls){
window.hls.destroy();
}

const hls = new Hls({
enableWorker:true,
lowLatencyMode:true
});

window.hls = hls;

hls.loadSource(url);

hls.attachMedia(video);

hls.on(
Hls.Events.MANIFEST_PARSED,
function(){

video.play();

});

}else{

video.src = url;

video.play();
}
}

</script>

</body>
</html>
