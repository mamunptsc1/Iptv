<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>LIVEFY TV</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:#050505;
  color:white;
  font-family:Arial,sans-serif;
}

/* HEADER */

.header{

  position:sticky;

  top:0;

  z-index:999;

  display:flex;

  justify-content:space-between;

  align-items:center;

  padding:15px;

  background:#111;

  box-shadow:
  0 0 15px rgba(255,0,60,0.3);
}

.logo{

  font-size:28px;

  font-weight:bold;

  color:#ff003c;

  text-shadow:
  0 0 10px #ff003c,
  0 0 20px #ff003c;
}

.telegram-btn{

  background:#ff003c;

  color:white;

  border:none;

  padding:10px 18px;

  border-radius:30px;

  font-weight:bold;
}

/* BANNER */

.banner{

  margin:15px;

  padding:14px;

  border-radius:18px;

  background:
  linear-gradient(90deg,#ff003c,#ff7b00);

  text-align:center;

  font-weight:bold;
}

/* CLOCK */

.clock{

  text-align:center;

  color:#00ff99;

  margin-bottom:10px;

  font-size:18px;
}

/* PLAYER */

.player-box{

  padding:10px;
}

video{

  width:100%;

  height:230px;

  border-radius:20px;

  background:black;
}

/* SEARCH */

.search-box{

  padding:15px;
}

.search-box input{

  width:100%;

  padding:14px;

  border:none;

  border-radius:15px;

  background:#161616;

  color:white;

  font-size:16px;
}

/* CHANNEL GRID */

.grid{

  display:grid;

  grid-template-columns:
  repeat(3,1fr);

  gap:15px;

  padding:15px;

  padding-bottom:120px;
}

.card{

  background:
  rgba(255,255,255,0.05);

  border:
  1px solid rgba(255,255,255,0.08);

  border-radius:22px;

  padding:15px;

  text-align:center;

  transition:0.3s;

  backdrop-filter:blur(10px);
}

.card:hover{

  transform:translateY(-5px);

  box-shadow:
  0 0 15px #ff003c;
}

.card img{

  width:70px;

  height:70px;

  object-fit:contain;
}

.card h3{

  margin-top:10px;

  font-size:15px;
}

/* BOTTOM NAV */

.bottom-nav{

  position:fixed;

  bottom:10px;

  left:10px;

  right:10px;

  background:#111;

  border-radius:35px;

  display:flex;

  justify-content:space-around;

  align-items:center;

  padding:18px;

  box-shadow:
  0 0 15px rgba(255,0,60,0.3);
}

.nav{

  text-align:center;

  font-size:22px;

  color:white;
}

.active{

  color:#ff003c;
}

/* MOBILE */

@media(max-width:768px){

  .grid{

    grid-template-columns:
    repeat(2,1fr);
  }
}

</style>
</head>

<body>

<!-- HEADER -->

<div class="header">

  <div class="logo">
    LIVEFY TV
  </div>

  <button class="telegram-btn">
    JOIN
  </button>

</div>

<!-- BANNER -->

<div class="banner">
🔥 LIVE SPORTS + MOVIES + BANGLA TV
</div>

<!-- CLOCK -->

<div class="clock" id="clock"></div>

<!-- PLAYER -->

<div class="player-box">

<video id="video"
controls
autoplay>
</video>

</div>

<!-- SEARCH -->

<div class="search-box">

<input type="text"
id="search"
placeholder="Search channels...">

</div>

<!-- CHANNELS -->

<div class="grid"
id="channels">
</div>

<!-- BOTTOM NAV -->

<div class="bottom-nav">

<div class="nav active">
🏠
</div>

<div class="nav">
📺
</div>

<div class="nav">
🎬
</div>

<div class="nav">
⚙️
</div>

</div>

<script>

/* LOAD JSON */

fetch('channels.json')

.then(res => res.json())

.then(data => {

  const channels = data.channels;

  let html = "";

  channels.forEach(channel => {

    if(!channel.name || !channel.url) return;

    html += `

    <div class="card"

    onclick="playChannel('${channel.url}')">

      <img src="https://cdn-icons-png.flaticon.com/512/2504/2504947.png">

      <h3>${channel.name}</h3>

    </div>

    `;
  });

  document.getElementById('channels').innerHTML = html;

  window.allChannels = channels;
});

/* PLAYER */

function playChannel(url){

  const video = document.getElementById('video');

  if(Hls.isSupported()){

    const hls = new Hls();

    hls.loadSource(url);

    hls.attachMedia(video);
  }

  video.play();
}

/* SEARCH */

document
.getElementById('search')

.addEventListener('keyup',function(){

  const value =
  this.value.toLowerCase();

  const filtered =
  window.allChannels.filter(ch =>

    ch.name
    .toLowerCase()
    .includes(value)

  );

  let html = "";

  filtered.forEach(channel => {

    html += `

    <div class="card"

    onclick="playChannel('${channel.url}')">

      <img src="https://cdn-icons-png.flaticon.com/512/2504/2504947.png">

      <h3>${channel.name}</h3>

    </div>

    `;
  });

  document.getElementById('channels').innerHTML = html;
});

/* CLOCK */

function updateClock(){

  const now = new Date();

  document
  .getElementById('clock')

  .innerHTML =

  now.toLocaleTimeString();
}

setInterval(updateClock,1000);

</script>

</body>
</html>
