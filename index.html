<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>LIVE TV</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#081426;
color:white;
overflow:hidden;
}

/* TOP BAR */

.topbar{
height:45px;
background:#ff0055;
display:flex;
align-items:center;
overflow:hidden;
font-weight:bold;
}

.notice{
background:black;
padding:14px;
font-size:14px;
}

.marquee{
white-space:nowrap;
animation:move 12s linear infinite;
padding-left:20px;
}

@keyframes move{
0%{transform:translateX(100%);}
100%{transform:translateX(-100%);}
}

/* VIDEO */

.player{
width:100%;
height:220px;
background:black;
position:sticky;
top:0;
z-index:999;
}

video{
width:100%;
height:100%;
object-fit:cover;
background:black;
}

/* SECTION */

.section{
display:flex;
justify-content:space-between;
align-items:center;
padding:18px 18px 5px;
}

.title{
font-size:15px;
letter-spacing:4px;
color:#8da2c0;
font-weight:bold;
}

.live{
background:#141f36;
padding:10px 18px;
border-radius:30px;
color:#ff0055;
font-weight:bold;
}

/* SEARCH */

.search{
padding:10px 18px;
}

.search input{
width:100%;
padding:14px;
border:none;
outline:none;
border-radius:15px;
background:#13233d;
color:white;
font-size:15px;
}

/* CHANNEL AREA */

.content{
height:calc(100vh - 330px);
overflow-y:auto;
padding-bottom:100px;
}

/* GRID */

.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:14px;
padding:15px;
}

/* CARD */

.card{
background:#13233d;
border-radius:22px;
padding:25px 10px;
text-align:center;
border:2px solid rgba(255,255,255,0.06);
transition:.3s;
}

.card:hover{
transform:scale(1.03);
border-color:#ff0055;
}

.card img{
width:65px;
height:65px;
object-fit:contain;
margin-bottom:12px;
}

.card h3{
font-size:15px;
}

/* NAVBAR */

.navbar{
position:fixed;
bottom:0;
left:0;
width:100%;
height:75px;
background:#091529;
display:flex;
justify-content:space-around;
align-items:center;
border-top:1px solid rgba(255,255,255,0.08);
}

.nav{
text-align:center;
font-size:14px;
color:#9aa8bb;
}

.active{
color:#ff0055;
}

.icon{
font-size:24px;
display:block;
margin-bottom:5px;
}

/* SCROLL */

::-webkit-scrollbar{
width:5px;
}

::-webkit-scrollbar-thumb{
background:#ff0055;
border-radius:10px;
}

</style>
</head>

<body>

<!-- TOPBAR -->

<div class="topbar">

<div class="notice">
NOTICE
</div>

<div class="marquee">
সব চ্যানেল লোড হতে ১০-১৫ সেকেন্ড সময় লাগতে পারে
</div>

</div>

<!-- PLAYER -->

<div class="player">

<video id="video" controls autoplay></video>

</div>

<!-- CONTENT -->

<div class="content">

<div class="section">

<div class="title">
PREMIUM TV CHANNELS
</div>

<div class="live">
🔴 LIVE TV
</div>

</div>

<!-- SEARCH -->

<div class="search">

<input type="text"
id="search"
placeholder="Search channel...">

</div>

<!-- CHANNELS -->

<div class="grid"
id="channels">
</div>

</div>

<!-- NAVBAR -->

<div class="navbar">

<div class="nav">
<span class="icon">🏠</span>
HOME
</div>

<div class="nav active">
<span class="icon">📺</span>
LIVE TV
</div>

<div class="nav">
<span class="icon">🎬</span>
MOVIES
</div>

<div class="nav">
<span class="icon">⚙️</span>
SETTING
</div>

</div>

<script>

fetch('channels.json')

.then(res => res.json())

.then(data => {

window.allChannels = data.channels;

loadChannels(data.channels);

});

/* LOAD CHANNELS */

function loadChannels(channels){

let html = "";

channels.forEach(ch => {

html += `

<div class="card"

onclick="playChannel('${ch.url}')">

<img src="https://cdn-icons-png.flaticon.com/512/2504/2504947.png">

<h3>${ch.name}</h3>

</div>

`;

});

document.getElementById('channels').innerHTML = html;

}

/* PLAYER */

function playChannel(url){

const video = document.getElementById('video');

if(Hls.isSupported()){

if(window.hls){
window.hls.destroy();
}

const hls = new Hls();

window.hls = hls;

hls.loadSource(url);

hls.attachMedia(video);

hls.on(Hls.Events.MANIFEST_PARSED,function(){

video.play();

});

}else{

video.src = url;

video.play();

}

}

/* SEARCH */

document.getElementById('search')

.addEventListener('keyup',function(){

const value = this.value.toLowerCase();

const filtered = window.allChannels.filter(ch =>

ch.name.toLowerCase().includes(value)

);

loadChannels(filtered);

});

</script>

</body>
</html>
