<!DOCTYPE html>
<html lang="bn">

<head>
<meta name="theme-color" content="#001133">
<meta name="description" content="Premium Live TV Streaming">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>LIVE TV</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<link rel="stylesheet" href="style.css">

</head>

<body>

<!-- TOPBAR -->

<div class="topbar">

<div class="notice">
NOTICE
</div>

<div class="notice-text">
<span>
সব চ্যানেল লোড হতে ১০-১৫ সেকেন্ড সময় লাগতে পারে
</span>
</div>

<div class="clock" id="clock">
Loading...
</div>

</div>

<!-- PLAYER -->

<div class="player-wrapper">

<div class="player">

<div id="loader">
Loading Channel...
</div>

<video
id="video"
controls

playsinline>
</video>

</div>


<!-- CONTENT -->

<div class="content">

<div class="fixed-top">

<div class="section-title">
PREMIUM TV CHANNELS
</div>

<div class="category-bar">

<!-- category buttons -->

</div>

<input
type="text"
class="search"
placeholder="🔍 Search channels..."
id="search">

</div>

<!-- CHANNELS -->

<div class="grid"
id="channels">

<div class="skeleton"></div>
<div class="skeleton"></div>
<div class="skeleton"></div>
<div class="skeleton"></div>
<div class="skeleton"></div>
<div class="skeleton"></div>

</div>
  
<!-- FOOTER -->

<div class="footer">
MADE BY MD MAMUNUR RASHID
</div>

<script>

/* CLOCK */

function updateClock(){

const now = new Date();

const days = [
'রবিবার',
'সোমবার',
'মঙ্গলবার',
'বুধবার',
'বৃহস্পতিবার',
'শুক্রবার',
'শনিবার'
];

const months = [
'জানুয়ারি',
'ফেব্রুয়ারি',
'মার্চ',
'এপ্রিল',
'মে',
'জুন',
'জুলাই',
'আগস্ট',
'সেপ্টেম্বর',
'অক্টোবর',
'নভেম্বর',
'ডিসেম্বর'
];

const bdTime =
new Date(
now.toLocaleString(
'en-US',
{timeZone:'Asia/Dhaka'}
)
);

let hour = bdTime.getHours();

const minute =
String(
bdTime.getMinutes()
).padStart(2,'0');

const second =
String(
bdTime.getSeconds()
).padStart(2,'0');

const ampm =
hour >= 12 ? 'PM' : 'AM';

hour = hour % 12;

hour = hour ? hour : 12;

document.getElementById(
'clock'
).innerHTML =
`${days[bdTime.getDay()]}, ${bdTime.getDate()} ${months[bdTime.getMonth()]} ${bdTime.getFullYear()}, ${hour}:${minute}:${second} ${ampm}`;

}

setInterval(updateClock,1000);

updateClock();

/* LOAD CHANNELS */

fetch('channels.json')

.then(res => res.json())

.then(data => {

window.allChannels = data.channels;

loadChannels(data.channels);

document.getElementById(
'allCount'
).innerText =
data.channels.length;

const saved =
localStorage.getItem('lastChannel');

if(saved){

setTimeout(()=>{

playChannel(saved);

},1000);

}

});

/* SHOW CHANNELS */

function loadChannels(channels){

let html = '';

channels.forEach((ch,index)=>{

html += `

<div class="card"
onclick="playChannel('${ch.url}',this)">

<img
src="${ch.logo || 'https://i.ibb.co/3k5p1t4/live-icon.png'}"
onerror="this.src='https://i.ibb.co/3k5p1t4/live-icon.png'">

<h3>${ch.name}</h3>

</div>

`;

});

document.getElementById(
'channels'
).innerHTML = html;
}

/* CATEGORY */

  
function filterCategory(type,el){

document
.querySelectorAll('.category-btn')
.forEach(btn=>{
btn.classList.remove('active');
});

el.classList.add('active');

let filtered = [];

if(type === 'all'){

filtered = window.allChannels;

}

else{

filtered =
window.allChannels.filter(ch=>

ch.category &&
ch.category.toLowerCase() === type

);

}

loadChannels(filtered);

}

/* SEARCH */

document
.getElementById('search')

.addEventListener('keyup',

function(){

const value =
this.value.toLowerCase();

const filtered =
window.allChannels.filter(ch=>

ch.name.toLowerCase()
.includes(value)

);

loadChannels(filtered);

});

/* PLAYER */

function playChannel(url,card){

localStorage.setItem(
'lastChannel',
url
);

document.getElementById('loader')
.style.display='block';

document
.querySelectorAll('.card')
.forEach(c=>{
c.classList.remove('active');
});

if(card){
card.classList.add('active');
}

const video =
document.getElementById('video');

if(Hls.isSupported()){

if(window.hls){
window.hls.destroy();
}

const hls = new Hls({
enableWorker:true,
lowLatencyMode:true
});

window.hls = hls;

hls.loadSource(url);

hls.attachMedia(video);

hls.on(
Hls.Events.MANIFEST_PARSED,
function(){

video.play().then(()=>{

document.getElementById('loader')
.style.display='none';

});

});

}else{

video.src = url;

video.play().then(()=>{

document.getElementById('loader')
.style.display='none';

});

}

}

/* REMOTE */

let currentIndex = 0;

document.addEventListener(
'keydown',
function(e){

const video =
document.getElementById('video');

if(e.key === 'ArrowDown'){

e.preventDefault();

if(currentIndex <
window.allChannels.length - 1){

currentIndex++;

const ch =
window.allChannels[currentIndex];

playChannel(
ch.url,
document.querySelectorAll('.card')[currentIndex]
);

}

}

if(e.key === 'ArrowUp'){

e.preventDefault();

if(currentIndex > 0){

currentIndex--;

const ch =
window.allChannels[currentIndex];

playChannel(
ch.url,
document.querySelectorAll('.card')[currentIndex]
);

}

}

if(e.key === 'ArrowRight'){

if(video.volume < 1){

video.volume += 0.1;

}

}

if(e.key === 'ArrowLeft'){

if(video.volume > 0){

video.volume -= 0.1;

}

}

});

</script>


<div class="safe-note">
⚠️ This website does not host any stream. All channels are publicly available on the internet.
</div>

</body>
</html>
