name: Auto Update Time

on:
  schedule:
    - cron: "0 * * * *"

  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Update Time
        run: |
          TIME=$(TZ='Asia/Dhaka' date '+%Y-%m-%d %I:%M %p')
          sed -i "5s|.*|# Last Updated: $TIME (BD Time)|" bd.m3u

      - name: Commit Changes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add bd.m3u

          git commit -m "Auto update time" || echo "No changes"

          git push
